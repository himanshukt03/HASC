<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | Health Alliance SoCal</title>
    <meta name="robots" content="noindex, follow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #f8fafc;
            color: #0f172a;
            text-align: center;
        }
        .container {
            max-width: 600px;
            padding: 40px 20px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }
        h1 {
            font-size: 3rem;
            color: #2563eb;
            margin-bottom: 10px;
        }
        h2 {
            font-size: 1.5rem;
            margin-top: 0;
            color: #334155;
        }
        p {
            color: #64748b;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        .nav-links {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .nav-links a {
            text-decoration: none;
            color: white;
            background-color: #2563eb;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: 600;
            transition: background-color 0.2s;
        }
        .nav-links a:hover {
            background-color: #1d4ed8;
        }
        .nav-links a.secondary {
            background-color: #e2e8f0;
            color: #475569;
        }
        .nav-links a.secondary:hover {
            background-color: #cbd5e1;
        }
        .search-bar {
            margin-top: 30px;
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        .search-bar input {
            padding: 10px 15px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            width: 100%;
            max-width: 300px;
            font-family: inherit;
        }
        .search-bar button {
            padding: 10px 20px;
            background-color: #2563eb;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-family: inherit;
            font-weight: 600;
        }
        .search-bar button:hover {
            background-color: #1d4ed8;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>404</h1>
        <h2>Page Not Found</h2>
        <p>The specific page you are looking for seems to be missing, but our home health care team is still here for you. You may have mistyped the address or the page may have moved.</p>
        
        <form class="search-bar" action="/search" method="GET" onsubmit="event.preventDefault(); window.location.href = '/?q=' + this.querySelector('input').value;">
            <input type="text" placeholder="Search for services..." required>
            <button type="submit">Search</button>
        </form>

        <div style="margin-top: 30px;">
            <div class="nav-links">
                <a href="/">Go to Homepage</a>
                <a href="/services" class="secondary">Our Services</a>
                <a href="/contact" class="secondary">Contact Us</a>
            </div>
        </div>
    </div>
</body>
</html>
