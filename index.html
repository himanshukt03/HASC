<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Theme Color for mobile browsers -->
    <meta name="theme-color" content="#2C6E91" />

    <!-- Preconnect & DNS Prefetch for third-party domains -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://www.googletagmanager.com" />
    <link rel="dns-prefetch" href="https://www.googletagmanager.com" />
    <!-- Unsplash: used heavily for hero + section images; preconnect shaves
         ~200-400 ms off the first Unsplash request on mobile -->
    <link rel="preconnect" href="https://images.unsplash.com" crossorigin />
    <link rel="dns-prefetch" href="https://images.unsplash.com" />

    <!-- LCP Hero Image Preload ─────────────────────────────────────────────
         Tells the browser to fetch the hero image immediately alongside the
         HTML parse — before JS loads and React renders the <img> tag.
         imagesrcset + imagesizes ensure mobile gets the 640px version (~35 KB)
         rather than the 1200px version (~90 KB), cutting LCP by ~300-600 ms. -->
    <link
      rel="preload"
      as="image"
      href="https://images.unsplash.com/photo-1584515933487-779824d29309?auto=format&fit=crop&q=80&w=1200"
      imagesrcset="https://images.unsplash.com/photo-1584515933487-779824d29309?auto=format&fit=crop&q=80&w=640 640w, https://images.unsplash.com/photo-1584515933487-779824d29309?auto=format&fit=crop&q=80&w=960 960w, https://images.unsplash.com/photo-1584515933487-779824d29309?auto=format&fit=crop&q=80&w=1200 1200w"
      imagesizes="(max-width: 640px) 100vw, (max-width: 1024px) 50vw, 600px"
      fetchpriority="high"
    />

    <!-- Google Fonts: Non-render-blocking async load ───────────────────────
         Only load the 5 weights actually used in the UI (400–800).
         Removed: wght 300 (unused), ital 400, ital 600 — saves ~40 KB on
         first load and ~120 ms on a slow 3G mobile connection. -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" media="print" onload="this.media='all'" />
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" />
    </noscript>

    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="HASC" />
    <link rel="manifest" href="/site.webmanifest" />
    
    <!-- Canonical Tag -->
    <link rel="canonical" href="https://www.healthalliancesocal.com/" id="canonical-url" />

    <!-- Primary Meta Tags -->
    <title>Health Alliance SoCal | Psychiatric &amp; Behavioral Health for Long-Term Care</title>
    <meta name="title" content="Health Alliance SoCal | Psychiatric &amp; Behavioral Health for Long-Term Care" />
    <meta name="description" content="Health Alliance SoCal provides integrated behavioral health and psychiatric care partnerships for skilled nursing facilities, assisted living communities, and memory care units across Southern California." />
    <meta name="keywords" content="behavioral health Southern California, psychiatric care long-term care, SNF psychiatry Los Angeles, memory care behavioral health, assisted living psychiatry, CMS F-Tag 758 compliance, psychotropic medication management, skilled nursing psychiatry Orange County, San Diego behavioral health, Riverside County psychiatry" />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="Health Alliance SoCal" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.healthalliancesocal.com/" />
    <meta property="og:title" content="Health Alliance SoCal | Psychiatric &amp; Behavioral Health for Long-Term Care" />
    <meta property="og:description" content="Health Alliance SoCal provides integrated behavioral health and psychiatric care partnerships for skilled nursing facilities, assisted living communities, and memory care units across Southern California." />
    <meta property="og:image" content="https://www.healthalliancesocal.com/images/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://www.healthalliancesocal.com/" />
    <meta property="twitter:title" content="Health Alliance SoCal | Psychiatric &amp; Behavioral Health for Long-Term Care" />
    <meta property="twitter:description" content="Health Alliance SoCal provides integrated behavioral health and psychiatric care partnerships for skilled nursing facilities, assisted living communities, and memory care units across Southern California." />
    <meta property="twitter:image" content="https://www.healthalliancesocal.com/images/og-image.jpg" />

    <!-- Inline Critical CSS -->
    <style>
      body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }
    </style>

    <!-- Structured Data (JSON-LD) -->

          "name": "Health Alliance SoCal",
          "url": "https://www.healthalliancesocal.com/",
          "logo": "https://www.healthalliancesocal.com/HASC_logo.png",

          "medicalSpecialty": "Psychiatry",
          "telephone": "+1-310-462-3879",
          "faxNumber": "+1-310-356-3417",
          "email": "DRamage@healthalliancesocal.com",
          "address": {
            "@type": "PostalAddress",
            "streetAddress": "501 E. Hardy St. Ste. 425",
            "addressLocality": "Inglewood",
            "addressRegion": "CA",
            "postalCode": "90301",
            "addressCountry": "US"
          },

            "longitude": -118.3531
          },
          "openingHoursSpecification": {

            "dayOfWeek": ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"],
            "opens": "00:00",

          },
          "sameAs": []

        {

          }

      ]

  </head>
  <body>
    <noscript>
      <p>This website requires JavaScript to function. Please enable JavaScript in your browser settings.</p>
    </noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Google Analytics 4 (GA4) — loaded at end of body to avoid render-blocking -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-93WD8FNXJP"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-93WD8FNXJP', {
        page_path: window.location.pathname,
      });
    </script>

    <!-- Email Obfuscation Helper -->
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        document.querySelectorAll(".protected-email").forEach(el => {
          const user = el.getAttribute("data-user");
          const domain = el.getAttribute("data-domain");
          if (user && domain) {
            el.innerHTML = `<a href="mailto:${user}&#64;${domain}">${user}&#64;${domain}</a>`;
          }
        });
      });
    </script>
  </body>
</html>
